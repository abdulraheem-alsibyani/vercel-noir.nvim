# vercel-noir for Alacritty
# matches the vercel-noir Neovim colorscheme

[colors.primary]
background = "#000000"
foreground = "#fbfbfb"

[colors.cursor]
text   = "#000000"
cursor = "#fbfbfb"

[colors.selection]
text       = "CellForeground"
background = "#163853"

[colors.normal]
black   = "#16171c"
red     = "#ff5240"
green   = "#4fe3a0"
yellow  = "#ffdc72"
blue    = "#5ea8ff"
magenta = "#ff4fb0"
cyan    = "#43e8cd"
white   = "#fbfbfb"

[colors.bright]
black   = "#8f8f8f"
red     = "#ff5240"
green   = "#4fe3a0"
yellow  = "#ffdc72"
blue    = "#5ea8ff"
magenta = "#b06bff"
cyan    = "#43e8cd"
white   = "#ffffff"
